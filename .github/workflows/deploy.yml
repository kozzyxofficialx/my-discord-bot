name: Deploy to Google Cloud VM

on:
  push:
    branches:
      - main   # change to "master" if that's your default branch

jobs:
  deploy:
    name: SSH & Restart Bot
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key:      ${{ secrets.VM_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo "==> Navigating to bot directory..."
            cd ${{ secrets.VM_PATH }}

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Installing/updating dependencies..."
            npm install --omit=dev --no-progress

            echo "==> Redeploying slash commands to Discord..."
            node src/deploy-guild.js || true

            echo "==> Restarting bot via pm2..."
            pm2 kill || true
            sleep 2
            pm2 start index.js --name KozzyX
            pm2 save

            echo "==> Waiting for startup..."
            sleep 5

            echo "==> PM2 status:"
            pm2 list

            echo "==> Recent bot logs:"
            pm2 logs KozzyX --lines 30 --nostream || true

            echo "==> Done! Bot is back online."
