name: Generate Changelog

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Changelog with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          COMMITS=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline)
          
          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d '{
              "model": "deepseek-chat",
              "messages": [
                {"role": "system", "content": "You are a professional developer. Write a concise, bulleted changelog based on these commit messages. Do not use markdown headers, just bullets."},
                {"role": "user", "content": "'"$COMMITS"'"}
              ]
            }')
          
          # Extract the text from the OpenAI-style JSON response
          CHANGELOG=$(echo $RESPONSE | python3 -c "import sys, json; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
          echo "CHANGELOG<<EOF" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
