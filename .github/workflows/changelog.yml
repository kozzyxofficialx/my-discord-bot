name: Generate Changelog

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Generate Changelog with DeepSeek
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          COMMITS=$(git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline || git log --oneline -n 10)
          
          RESPONSE=$(curl -s https://api.deepseek.com/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $DEEPSEEK_API_KEY" \
            -d "{
              \"model\": \"deepseek-chat\",
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a professional developer. Write a concise, bulleted changelog based on commit messages.\"},
                {\"role\": \"user\", \"content\": \"$COMMITS\"}
              ]
            }")
          
          CHANGELOG=$(echo $RESPONSE | python3 -c "import sys, json; data = json.load(sys.stdin); print(data['choices'][0]['message']['content'])")
          echo "CHANGELOG<<TEMP" >> $GITHUB_ENV
          echo "$CHANGELOG" >> $GITHUB_ENV
          echo "TEMP" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body: ${{ env.CHANGELOG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
