<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kozzyx — a reasonable moderation bot</title>
    <meta name="description" content="kozzyx is an all-in-one Discord bot: moderation, AI (Claude-powered /ask & /imagine), tickets, and one-command server setup. 50+ commands, slash + prefix, none paywalled." />
    <meta property="og:title" content="kozzyx — a reasonable moderation bot" />
    <meta property="og:description" content="Moderation, AI, tickets, and server setup. 50+ commands. Add to your Discord server in 30 seconds." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://kozzyx.app/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="kozzyx — a reasonable moderation bot" />
    <meta name="twitter:description" content="Moderation, AI, tickets, and server setup. 50+ commands. Add to your Discord server in 30 seconds." />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect x='6' y='8' width='28' height='26' rx='8' fill='%238b5cf6'/><rect x='11' y='13' width='18' height='13' rx='4' fill='%230b0b0d'/><circle cx='16' cy='19.5' r='1.6' fill='white'/><circle cx='24' cy='19.5' r='1.6' fill='white'/><line x1='20' y1='8' x2='20' y2='4' stroke='%238b5cf6' stroke-width='1.5' stroke-linecap='round'/><circle cx='20' cy='3' r='1.5' fill='%238b5cf6'/></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0b0b0d;
            --bg-elev: #131316;
            --bg-elev-2: #1a1a1f;
            --fg: #ededf0;
            --fg-dim: #a0a0a8;
            --fg-faint: #5a5a62;
            --line: #242428;
            --line-soft: #1c1c20;
            --accent: oklch(0.72 0.17 280);
            --accent-soft: oklch(0.72 0.17 280 / 0.14);
            --accent-fg: #ffffff;
            --danger: oklch(0.70 0.18 25);
            --ok: oklch(0.78 0.15 155);
            --warn: oklch(0.80 0.15 80);
        }

        html[data-theme="light"] {
            --bg: #f7f7f5;
            --bg-elev: #ffffff;
            --bg-elev-2: #f0f0ec;
            --fg: #111113;
            --fg-dim: #5a5a62;
            --fg-faint: #9a9aa4;
            --line: #e4e4e0;
            --line-soft: #ededea;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Geist', -apple-system, system-ui, sans-serif;
            font-feature-settings: 'ss01', 'cv01';
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .mono {
            font-family: 'Geist Mono', ui-monospace, monospace;
        }

        .serif {
            font-family: 'Instrument Serif', serif;
        }

        ::selection {
            background: var(--accent);
            color: var(--accent-fg);
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        #root {
            position: relative;
            z-index: 1;
        }

        /* ============ AURORA BACKGROUND ============ */
        .aurora {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora::before,
        .aurora::after {
            content: '';
            position: absolute;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            will-change: transform;
        }

        .aurora::before {
            background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
            top: -20%;
            left: -20%;
            animation: auroraA 22s ease-in-out infinite alternate;
        }

        .aurora::after {
            background: radial-gradient(circle, oklch(0.6 0.22 220) 0%, transparent 60%);
            bottom: -30%;
            right: -20%;
            animation: auroraB 28s ease-in-out infinite alternate;
            opacity: 0.22;
        }

        @keyframes auroraA {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30vw, 20vh) scale(1.2);
            }
        }

        @keyframes auroraB {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-25vw, -20vh) scale(1.3);
            }
        }

        /* ============ 3D CYBER GRID ============ */
        .cyber-grid {
            position: absolute;
            bottom: -50vh;
            left: -50vw;
            width: 200vw;
            height: 100vh;
            background-image: 
                linear-gradient(to right, var(--line-soft) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(600px) rotateX(75deg);
            animation: gridMove 10s linear infinite;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
        }

        @keyframes gridMove {
            0% { transform: perspective(600px) rotateX(75deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(75deg) translateY(60px); }
        }

        /* ============ BOOT LOADER ============ */
        .boot-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.8, 0, 0.2, 1), transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
            transform-origin: top;
        }

        .boot-loader.hidden {
            opacity: 0;
            transform: scaleY(0);
            pointer-events: none;
        }

        .boot-text {
            font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .boot-progress-bar {
            width: 200px;
            height: 2px;
            background: var(--line);
            overflow: hidden;
            position: relative;
        }

        .boot-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* ============ SPOTLIGHT CARDS ============ */
        .spotlight-card {
            position: relative;
            overflow: hidden;
        }

        .spotlight-card::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: radial-gradient(400px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), var(--accent-soft), transparent 40%);
            pointer-events: none;
            z-index: 10;
        }

        .spotlight-card:hover::after {
            opacity: 1;
        }

        /* ============ SCROLL REVEAL ============ */
        [data-reveal] {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }

        [data-reveal].in {
            opacity: 1;
            transform: translateY(0);
        }

        [data-reveal="left"] {
            transform: translateX(-40px);
        }

        [data-reveal="left"].in {
            transform: translateX(0);
        }

        [data-reveal="right"] {
            transform: translateX(40px);
        }

        [data-reveal="right"].in {
            transform: translateX(0);
        }

        [data-reveal="scale"] {
            transform: scale(0.92);
        }

        [data-reveal="scale"].in {
            transform: scale(1);
        }

        /* ============ TEXT SHINE (for hero h1 italic) ============ */
        .shine {
            background: linear-gradient(110deg, var(--accent) 30%, #fff 50%, var(--accent) 70%);
            background-size: 250% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shineMove 4s linear infinite;
        }

        @keyframes shineMove {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ============ GLOW RING (buttons) ============ */
        .glow-ring {
            position: relative;
            isolation: isolate;
        }

        .glow-ring::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: conic-gradient(from var(--a, 0deg), var(--accent), transparent 30%, var(--accent));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
            animation: spinRing 3s linear infinite;
        }

        .glow-ring:hover::before {
            opacity: 0.85;
        }

        @keyframes spinRing {
            to {
                --a: 360deg;
            }
        }

        @property --a {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        /* ============ MAGNETIC BUTTON BASE ============ */
        .magnetic {
            transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        /* ============ FLOATING PARTICLES (hero bg) ============ */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.5;
            animation: drift var(--dur, 20s) linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translate(var(--tx, 100px), var(--ty, -300px));
                opacity: 0;
            }
        }

        /* ============ MARQUEE ============ */
        .marquee-track {
            animation: marquee 40s linear infinite;
        }

        @keyframes marquee {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* ============ TYPEWRITER CARET ============ */
        .caret::after {
            content: '▍';
            color: var(--accent);
            animation: caretBlink 0.9s steps(2) infinite;
            margin-left: 2px;
        }

        @keyframes caretBlink {
            50% {
                opacity: 0;
            }
        }

        /* ============ CHAT ENTRANCE ============ */
        @keyframes chatIn {
            0% {
                opacity: 0;
                transform: translateY(14px) scale(0.96);
                filter: blur(4px);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ============ HERO HEADLINE MASK ============ */
        .head-mask {
            overflow: hidden;
            display: inline-block;
        }

        .head-inner {
            display: inline-block;
            animation: riseUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .head-inner.d1 {
            animation-delay: 0.05s;
        }

        .head-inner.d2 {
            animation-delay: 0.18s;
        }

        .head-inner.d3 {
            animation-delay: 0.32s;
        }

        @keyframes riseUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        /* ============ INTERACTIVE TWEAKS ============ */
        .marquee-divider {
            width: 100vw;
            background: var(--accent-soft);
            border-top: 1px solid var(--accent);
            border-bottom: 1px solid var(--accent);
            padding: 12px 0;
            position: relative;
            z-index: 10;
            margin: 60px 0;
            overflow: hidden;
            display: flex;
            box-shadow: 0 0 40px var(--accent-soft);
            margin-left: calc(-50vw + 50%);
        }
        .marquee-inner {
            display: flex;
            white-space: nowrap;
            animation: marquee 14s linear infinite;
        }
        .marquee-item {
            font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 14px;
            font-weight: 600;
            color: var(--accent);
            margin: 0 40px;
            letter-spacing: 2px;
        }

        .dynamic-island {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(120px) scale(0.9);
            z-index: 10000;
            background: rgba(20, 20, 24, 0.7);
            backdrop-filter: blur(20px) saturate(140%);
            -webkit-backdrop-filter: blur(20px) saturate(140%);
            border: 1px solid var(--line);
            border-radius: 100px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05) inset;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
        }
        .dynamic-island.visible {
            transform: translateX(-50%) translateY(0) scale(1);
            opacity: 1;
            pointer-events: all;
        }
        .island-link {
            font-size: 13px;
            font-weight: 500;
            color: var(--fg-dim);
            padding: 8px 16px;
            border-radius: 100px;
            transition: all 0.2s ease;
        }
        .island-link:hover {
            color: var(--fg);
            background: rgba(255,255,255,0.08);
        }

        #cursor-blob {
            position: fixed;
            top: 0; left: 0;
            width: 48px; height: 48px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.25;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), height 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), background 0.3s ease, border-radius 0.2s ease;
            mix-blend-mode: screen;
            will-change: left, top, width, height;
        }
        #cursor-blob.active {
            width: 24px; height: 24px;
            background: #fff;
            opacity: 0.6;
        }

        @keyframes glitch {
            0% { transform: translate(0); filter: hue-rotate(0deg) drop-shadow(0 0 transparent); }
            20% { transform: translate(-2px, 1px); filter: hue-rotate(90deg) drop-shadow(4px 0 #0ff); }
            40% { transform: translate(-1px, -2px); filter: hue-rotate(180deg) drop-shadow(-4px 0 #f0f); }
            60% { transform: translate(2px, 1px); filter: hue-rotate(270deg) drop-shadow(4px 0 #0ff); }
            80% { transform: translate(1px, -1px); filter: hue-rotate(360deg) drop-shadow(-4px 0 #f0f); }
            100% { transform: translate(0); filter: hue-rotate(0deg) drop-shadow(0 0 transparent); }
        }
        .btn-glitch {
            position: relative;
            transform-origin: center;
        }
        .btn-glitch:active {
            animation: glitch 0.2s linear !important;
        }
        }

        /* ============ RESPECT REDUCED MOTION ============ */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* ============ MOBILE RESPONSIVE ============ */
        @media (max-width: 900px) {
            .hero-grid { grid-template-columns: 1fr !important; gap: 48px !important; }
            .hero-grid > div:last-child { order: -1; }
            .features-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
            .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
            .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .stats-grid > div:nth-child(2) { border-right: none !important; }
            .dashboard-body { grid-template-columns: 1fr !important; }
            .dashboard-sidebar { display: none !important; }
            nav > div:nth-child(2) { display: none !important; }
            .how-grid { grid-template-columns: 1fr !important; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
            .mobile-hamburger { display: grid !important; }
            .nav-cta-btn { display: none !important; }
        }

        @media (max-width: 600px) {
            section, .section-pad { padding-left: 20px !important; padding-right: 20px !important; }
            .stats-grid { grid-template-columns: 1fr 1fr !important; }
            .footer-grid { grid-template-columns: 1fr !important; }
            nav { padding: 14px 20px !important; }
            .changelog-row { grid-template-columns: 1fr !important; gap: 16px !important; }
        }

        /* ============ HOW IT WORKS SECTION ============ */
        .how-step {
            position: relative;
            padding: 28px 24px;
            background: var(--bg-elev);
            border: 1px solid var(--line);
            border-radius: 16px;
            transition: border-color 0.25s, transform 0.25s;
        }
        .how-step:hover {
            border-color: color-mix(in oklab, var(--accent) 50%, var(--line));
            transform: translateY(-4px);
        }
        .how-step-number {
            font-family: 'Geist Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            letter-spacing: 0.1em;
            margin-bottom: 16px;
            opacity: 0.8;
        }
        .how-step-connector {
            position: absolute;
            top: 50%;
            right: -28px;
            width: 28px;
            height: 1px;
            background: linear-gradient(90deg, var(--line), transparent);
            pointer-events: none;
        }

        /* ============ STATUS BADGE ============ */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 100px;
            background: color-mix(in oklab, var(--ok) 12%, transparent);
            border: 1px solid color-mix(in oklab, var(--ok) 30%, transparent);
            font-size: 11px;
            color: var(--ok);
            font-family: 'Geist Mono', monospace;
        }
        .status-dot-live {
            width: 6px; height: 6px; border-radius: 3px;
            background: var(--ok);
            animation: pulseLive 2s ease-in-out infinite;
        }
        @keyframes pulseLive {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 color-mix(in oklab, var(--ok) 60%, transparent); }
            50% { opacity: 0.7; box-shadow: 0 0 0 4px transparent; }
        }

        /* ============ COMMAND CATEGORY COLORS ============ */
        .cmd-cat-mod    { color: var(--danger) !important; }
        .cmd-cat-ai     { color: var(--ok) !important; }
        .cmd-cat-setup  { color: var(--warn) !important; }
        .cmd-cat-ticket { color: oklch(0.78 0.14 240) !important; }

        /* ============ STAGGER REVEAL ============ */
        [data-stagger] > * {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1), transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }
        [data-stagger].in > *:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.05s; }
        [data-stagger].in > *:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.12s; }
        [data-stagger].in > *:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.19s; }
        [data-stagger].in > *:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.26s; }
        [data-stagger].in > *:nth-child(5) { opacity: 1; transform: translateY(0); transition-delay: 0.33s; }

        /* ============ ANIMATED UNDERLINE LINKS ============ */
        .underline-link {
            position: relative;
        }
        .underline-link::after {
            content: '';
            position: absolute;
            left: 0; bottom: -2px;
            width: 0; height: 1px;
            background: var(--accent);
            transition: width 0.25s ease;
        }
        .underline-link:hover::after { width: 100%; }

        /* ============ COMMAND HOVER GLOW ============ */
        .cmd-row:hover {
            background: var(--bg-elev) !important;
        }
        .cmd-row:hover .cmd-name {
            color: var(--accent) !important;
        }

        /* ============ SECTION FADE KEYFRAME ============ */
        @keyframes sectionFadeIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ============ TABS SHIMMER ON SWITCH ============ */
        @keyframes tabShimmer {
            0% { opacity: 0; transform: translateX(-8px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .tab-content-enter { animation: tabShimmer 0.3s cubic-bezier(0.22,1,0.36,1) both; }

        /* ============ COUNTER PULSE ============ */
        @keyframes counterPop {
            0% { transform: scale(1); }
            40% { transform: scale(1.04); }
            100% { transform: scale(1); }
        }
        .counter-pop { animation: counterPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
    </style>
</head>

<body>
    <div id="scroll-progress" style="position:fixed;top:0;left:0;height:2px;background:var(--accent);z-index:99998;width:0%;transition:width 0.1s linear;box-shadow:0 0 8px var(--accent);"></div>
    <div class="aurora">
        <div class="cyber-grid"></div>
    </div>
    <div class="grain"></div>
    <div id="boot-loader" class="boot-loader">
        <div class="boot-text" id="boot-text">BOOTING KOZZYX OS...</div>
        <div class="boot-progress-bar">
            <div class="boot-progress-fill" id="boot-fill"></div>
        </div>
    </div>
    <div id="root"></div>
    <canvas id="trail" style="position:fixed;inset:0;pointer-events:none;z-index:9998;"></canvas>

    <script>
        // Tweakable defaults — host persists changes written here
        window.KOZZ_TWEAKS = /*EDITMODE-BEGIN*/{

        // ==== src/mascot.jsx ====
        // Kozzy the mascot — a geometric blob-bot. Animated eyes track cursor.
        // Not a copy of any existing character — just a friendly rounded rectangle with feelings.

        function Mascot({ size = 240, mood: defaultMood = 'neutral', blink = true }) {
            const [eye, setEye] = React.useState({ x: 0, y: 0 });
            const [blinking, setBlinking] = React.useState(false);
            const [mood, setMood] = React.useState(defaultMood);
            const [bouncing, setBouncing] = React.useState(false);
            const ref = React.useRef(null);

            React.useEffect(() => {
                if (!blink) return;
                let t;
                const loop = () => {
                    setBlinking(true);
                    setTimeout(() => setBlinking(false), 140);
                    t = setTimeout(loop, 2200 + Math.random() * 3500);
                };
                t = setTimeout(loop, 1500);
                return () => clearTimeout(t);
            }, [blink]);

            React.useEffect(() => {
                const onMove = (e) => {
                    if (!ref.current) return;
                    const r = ref.current.getBoundingClientRect();
                    const cx = r.left + r.width / 2;
                    const cy = r.top + r.height / 2;
                    const dx = (e.clientX - cx) / Math.max(r.width, 300);
                    const dy = (e.clientY - cy) / Math.max(r.height, 300);
                    const mag = Math.min(1, Math.hypot(dx, dy) * 1.4);
                    const ang = Math.atan2(dy, dx);
                    setEye({ x: Math.cos(ang) * mag * 4, y: Math.sin(ang) * mag * 4 });
                };
                window.addEventListener('mousemove', onMove);
                return () => window.removeEventListener('mousemove', onMove);
            }, []);

            const mouthPath = {
                neutral: 'M 78 130 Q 100 136 122 130',
                happy: 'M 76 126 Q 100 146 124 126',
                smug: 'M 80 132 Q 100 128 120 134',
                alert: 'M 82 132 L 118 132',
            }[mood] || 'M 78 130 Q 100 136 122 130';

            const handleClick = () => {
                if (bouncing) return;
                setMood('happy');
                setBouncing(true);
                setTimeout(() => setBouncing(false), 400);
                setTimeout(() => setMood(defaultMood), 2000);
            };

            return (
                <svg ref={ref} onClick={handleClick} viewBox="0 0 200 200" width={size} height={size} style={{ 
                    display: 'block', 
                    overflow: 'visible', 
                    cursor: 'pointer',
                    transform: bouncing ? 'scale(1.08) translateY(-12px)' : 'scale(1) translateY(0)',
                    transition: 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)'
                }}>
                    <defs>
                        <linearGradient id="body-grad" x1="0" x2="0" y1="0" y2="1">
                            <stop offset="0" stopColor="var(--accent)" stopOpacity="1" />
                            <stop offset="1" stopColor="var(--accent)" stopOpacity="0.75" />
                        </linearGradient>
                        <radialGradient id="body-shade" cx="0.35" cy="0.3" r="0.8">
                            <stop offset="0" stopColor="#ffffff" stopOpacity="0.25" />
                            <stop offset="1" stopColor="#ffffff" stopOpacity="0" />
                        </radialGradient>
                    </defs>

                    {/* shadow */}
                    <ellipse cx="100" cy="185" rx="55" ry="6" fill="#000" opacity="0.25" />

                    {/* antenna */}
                    <line x1="100" y1="40" x2="100" y2="22" stroke="var(--accent)" strokeWidth="3" strokeLinecap="round" />
                    <circle cx="100" cy="19" r="5" fill="var(--accent)">
                        <animate attributeName="r" values="5;6;5" dur="1.8s" repeatCount="indefinite" />
                    </circle>

                    {/* body — rounded square */}
                    <rect x="40" y="42" width="120" height="130" rx="36" ry="36" fill="url(#body-grad)" />
                    <rect x="40" y="42" width="120" height="130" rx="36" ry="36" fill="url(#body-shade)" />
                    <rect x="40" y="42" width="120" height="130" rx="36" ry="36" fill="none" stroke="rgba(0,0,0,0.2)" strokeWidth="1" />

                    {/* screen / face panel */}
                    <rect x="54" y="70" width="92" height="74" rx="20" ry="20" fill="#0b0b0d" opacity="0.92" />
                    <rect x="54" y="70" width="92" height="74" rx="20" ry="20" fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="1" />

                    {/* eyes */}
                    <g transform={`translate(${eye.x}, ${eye.y})`}>
                        <circle cx="82" cy="102" r={blinking ? 0.5 : 5} fill="#fff" style={{ transition: 'r 80ms' }} />
                        <circle cx="118" cy="102" r={blinking ? 0.5 : 5} fill="#fff" style={{ transition: 'r 80ms' }} />
                        {!blinking && (
                            <>
                                <circle cx="84" cy="100" r="1.5" fill="var(--accent)" />
                                <circle cx="120" cy="100" r="1.5" fill="var(--accent)" />
                            </>
                        )}
                    </g>

                    {/* mouth */}
                    <path d={mouthPath} stroke="#fff" strokeWidth="3" fill="none" strokeLinecap="round" />

                    {/* cheek blush */}
                    <circle cx="62" cy="122" r="4" fill="var(--accent)" opacity="0.4" />
                    <circle cx="138" cy="122" r="4" fill="var(--accent)" opacity="0.4" />

                    {/* feet */}
                    <rect x="62" y="170" width="22" height="8" rx="4" fill="var(--accent)" opacity="0.7" />
                    <rect x="116" y="170" width="22" height="8" rx="4" fill="var(--accent)" opacity="0.7" />
                </svg>
            );
        }

        // ==== src/scramble.jsx ====
        function ScrambleText({ text, delay = 0 }) {
            const [out, setOut] = React.useState('');
            const chars = '!<>-_\\\\/[]{}—=+*^?#_';
            
            React.useEffect(() => {
                let start = null;
                const duration = 1200;
                let reqId;

                const tick = (now) => {
                    if (!start) start = now;
                    const elapsed = now - start;
                    if (elapsed < delay) {
                        reqId = requestAnimationFrame(tick);
                        return;
                    }
                    const progress = Math.max(0, Math.min(1, (elapsed - delay) / duration));
                    
                    if (progress >= 1) {
                        setOut(text);
                        return;
                    }
                    
                    const revealedCount = Math.floor(progress * text.length);
                    let scrambled = '';
                    for (let i = 0; i < text.length; i++) {
                        if (i < revealedCount || text[i] === ' ') {
                            scrambled += text[i];
                        } else {
                            scrambled += chars[Math.floor(Math.random() * chars.length)];
                        }
                    }
                    setOut(scrambled);
                    reqId = requestAnimationFrame(tick);
                };
                reqId = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(reqId);
            }, [text, delay]);

            return <span>{out || '\u00A0'}</span>;
        }

        function StatCell({ n, label, note, isLast }) {
            const [val, setVal] = React.useState(0);
            const ref = React.useRef(null);
            const [hovered, setHovered] = React.useState(false);

            React.useEffect(() => {
                const io = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            const duration = 1400;
                            const start = performance.now();
                            const tick = (now) => {
                                const t = Math.min(1, (now - start) / duration);
                                const eased = 1 - Math.pow(1 - t, 3);
                                setVal(Math.round(n * eased));
                                if (t < 1) requestAnimationFrame(tick);
                            };
                            requestAnimationFrame(tick);
                            io.disconnect();
                        }
                    });
                }, { threshold: 0.3 });
                if (ref.current) io.observe(ref.current);
                return () => io.disconnect();
            }, [n]);

            return (
                <div
                    ref={ref}
                    data-statcell
                    onMouseEnter={() => setHovered(true)}
                    onMouseLeave={() => setHovered(false)}
                    style={{
                        padding: '32px 28px',
                        borderRight: isLast ? 'none' : '1px solid var(--line)',

            );

                const matchType = cmdType === 'all' || (cmdType === 'prefix' ? cmd.prefix : !cmd.prefix);
                return matchQ && matchCat && matchType;

        function DynamicIsland() {
            const [visible, setVisible] = React.useState(false);
            React.useEffect(() => {
                const onScroll = () => setVisible(window.scrollY > 500);
                window.addEventListener('scroll', onScroll, { passive: true });
                return () => window.removeEventListener('scroll', onScroll);
            }, []);
            return (
                <div className={`dynamic-island ${visible ? 'visible' : ''}`}>
                    <a href="#features" className="island-link">⌘ Features</a>
                    <a href="#commands" className="island-link">⌘ Commands</a>

                </div>
            );
        }

        // ==== src/cursorblob.jsx ====
        function CursorBlob() {
            const ref = React.useRef(null);
            React.useEffect(() => {
                const onMove = (e) => {
                    if (ref.current) {
                        ref.current.style.transform = `translate(calc(${e.clientX}px - 50%), calc(${e.clientY}px - 50%))`;
                    }
                };
                const onDown = () => ref.current?.classList.add('active');
                const onUp = () => ref.current?.classList.remove('active');
                window.addEventListener('mousemove', onMove, { passive: true });
                window.addEventListener('mousedown', onDown);
                window.addEventListener('mouseup', onUp);
                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mousedown', onDown);
                    window.removeEventListener('mouseup', onUp);
                }
            }, []);
            return <div id="cursor-blob" ref={ref}></div>;
        }

        function AnimatedNumber({ value }) {
            const [display, setDisplay] = React.useState(0);
            const ref = React.useRef(null);
            
            React.useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        let current = 0;
                        const duration = 1200;
                        const startTime = performance.now();
                        
                        const animate = (now) => {
                            const progress = Math.min((now - startTime) / duration, 1);
                            // ease out expo
                            const ease = progress === 1 ? 1 : 1 - Math.pow(2, -10 * progress);
                            setDisplay(Math.floor(ease * value));
                            if (progress < 1) requestAnimationFrame(animate);
                        };
                        requestAnimationFrame(animate);
                        observer.disconnect();
                    }
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [value]);

            return <span ref={ref}>{display}</span>;
        }

        // Parse GitHub release markdown body into structured items
        // Expects sections like: ### New, ### Fixed, ### Changed with - bullet lines
        function parseReleaseBody(body) {
            if (!body) return [];
            const items = [];
            let currentType = 'new';
            const typeMap = { 'new': 'new', 'added': 'new', 'fixed': 'fix', 'fix': 'fix', 'changed': 'change', 'change': 'change', 'breaking': 'change' };
            body.split('\n').forEach(line => {
                const heading = line.match(/^#{1,3}\s+(.+)/);
                if (heading) {
                    const key = heading[1].toLowerCase().trim();
                    currentType = typeMap[key] || 'new';
                    return;
                }
                const bullet = line.match(/^[-*]\s+(.+)/);
                if (bullet) {
                    items.push({ type: currentType, text: bullet[1].trim() });
                }
            });
            // If no structured sections found, treat every bullet as 'new'
            if (items.length === 0) {
                body.split('\n').forEach(line => {
                    const bullet = line.match(/^[-*]\s+(.+)/);
                    if (bullet) items.push({ type: 'new', text: bullet[1].trim() });
                });
            }
            return items;
        }

                window.addEventListener('message', onMsg);

                return () => window.removeEventListener('message', onMsg);

                        document.querySelector('#commands input')?.focus();
                    }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            const handleSetAccent = (a) => {
                setAccent(a);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: a } }, '*');

        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        // ===================== ANIMATION RUNTIME =====================
        // Runs after React mounts. Adds scroll-reveal, magnetic buttons,
        // cursor trail on mascot area, and floating particles in hero.

        requestAnimationFrame(() => setTimeout(() => {
            // ---------- Scroll reveal ----------
            const revealTargets = [
                ['section > div > h2', 'up'],
                ['section > div .serif', 'up'],
                ['section p', 'up'],
                ['.discord-preview, [style*="border-radius: 16"]', 'scale'],
            ];
            // Generic: tag every section direct child
            document.querySelectorAll('section').forEach((sec) => {
                if (!sec.hasAttribute('data-reveal')) sec.setAttribute('data-reveal', 'up');
            });
            const io = new IntersectionObserver((entries) => {
                entries.forEach((e) => {
                    if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('[data-reveal]').forEach((el) => io.observe(el));

            // ---------- Magnetic buttons ----------
            document.querySelectorAll('a, button').forEach((el) => {
                const isCta = (el.textContent || '').match(/Add to Discord|View commands|Read the docs|See commands/);
                if (!isCta) return;
                el.classList.add('magnetic', 'glow-ring', 'btn-glitch');
                el.addEventListener('mousemove', (e) => {
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left - r.width / 2) * 0.25;
                    const y = (e.clientY - r.top - r.height / 2) * 0.4;
                    el.style.transform = `translate(${x}px, ${y}px)`;
                });
                el.addEventListener('mouseleave', () => { el.style.transform = ''; });
            });

            // ---------- Cursor trail (sparkles that fade) ----------
            const canvas = document.getElementById('trail');
            const ctx = canvas.getContext('2d');
            const resize = () => { if (canvas) { canvas.width = innerWidth; canvas.height = innerHeight; } };
            resize(); addEventListener('resize', resize);
            const trail = [];
            let active = false;
            addEventListener('mousemove', (e) => {
                active = true;
                trail.push({ x: e.clientX, y: e.clientY, life: 1, size: 2 + Math.random() * 3 });
                if (trail.length > 40) trail.shift();
            });
            let cachedAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || 'violet';
            const accentObserver = new MutationObserver(() => {
                cachedAccent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || 'violet';
            });
            accentObserver.observe(document.documentElement, { attributes: true, attributeFilter: ['style'] });
            (function loop() {
                if (!canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = trail.length - 1; i >= 0; i--) {
                    const p = trail[i];
                    p.life -= 0.035;
                    if (p.life <= 0) { trail.splice(i, 1); continue; }
                    ctx.beginPath();
                    ctx.fillStyle = cachedAccent;
                    ctx.globalAlpha = p.life * 0.7;
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(loop);
            })();

            // ---------- Floating particles in hero ----------
            const hero = document.querySelector('section');
            if (hero) {
                const particles = document.createElement('div');
                particles.className = 'particles';
                for (let i = 0; i < 18; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = 100 + Math.random() * 10 + '%';
                    p.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                    p.style.setProperty('--ty', -(400 + Math.random() * 400) + 'px');
                    p.style.setProperty('--dur', (12 + Math.random() * 16) + 's');
                    p.style.animationDelay = -(Math.random() * 20) + 's';
                    particles.appendChild(p);
                }
                hero.appendChild(particles);
            }

            // ---------- Parallax on hero mascot ----------
            const mascotWrap = document.querySelector('section [style*="animation: float"]');
            if (mascotWrap) {
                addEventListener('scroll', () => {
                    const y = scrollY * 0.15;
                    mascotWrap.style.setProperty('transform', `translateY(${-y}px)`);
                }, { passive: true });
            }

            // ---------- Tilt and Spotlight on feature visuals + dashboard ----------
            document.querySelectorAll('[data-tiltcard]').forEach((card) => {
                
                card.classList.add('spotlight-card');
                card.style.transition = 'transform 0.3s cubic-bezier(0.22, 1, 0.36, 1)';
                
                card.addEventListener('mousemove', (e) => {
                    const r = card.getBoundingClientRect();
                    
                    card.style.setProperty('--mouse-x', `${e.clientX - r.left}px`);
                    card.style.setProperty('--mouse-y', `${e.clientY - r.top}px`);
                    
                    const rx = ((e.clientY - r.top) / r.height - 0.5) * -6;
                    const ry = ((e.clientX - r.left) / r.width - 0.5) * 6;
                    card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
                });
                card.addEventListener('mouseleave', () => { card.style.transform = ''; });
            });

            // ---------- Bootloader Reveal ----------
            const loader = document.getElementById('boot-loader');
            const fill = document.getElementById('boot-fill');
            const bootText = document.getElementById('boot-text');
            if (loader && fill) {
                setTimeout(() => { fill.style.width = '30%'; }, 100);
                setTimeout(() => { fill.style.width = '70%'; bootText.textContent = 'ESTABLISHING CONNECTION...'; }, 400);
                setTimeout(() => { fill.style.width = '100%'; bootText.textContent = 'SYSTEM READY.'; }, 800);
                setTimeout(() => { loader.classList.add('hidden'); }, 1200);
            }

            // ---------- Apply text shine to hero italic ----------
            const heroItalic = document.querySelector('h1 .serif');
            if (heroItalic) heroItalic.classList.add('shine');

            // ---------- Scroll progress bar ----------
            const progressBar = document.getElementById('scroll-progress');
            if (progressBar) {
                addEventListener('scroll', () => {
                    const total = document.body.scrollHeight - innerHeight;
                    progressBar.style.width = (scrollY / total * 100) + '%';
                }, { passive: true });
            }

            // ---------- Stagger reveal for .how-grid and stats grid ----------
            const staggerObs = new IntersectionObserver((entries) => {
                entries.forEach((e) => {
                    if (e.isIntersecting) { e.target.classList.add('in'); staggerObs.unobserve(e.target); }
                });
            }, { threshold: 0.1 });
            document.querySelectorAll('[data-stagger]').forEach((el) => staggerObs.observe(el));

            // ---------- Counter pop on stat cells ----------
            const statCells = document.querySelectorAll('[data-statcell]');
            const popObs = new IntersectionObserver((entries) => {
                entries.forEach((e) => {
                    if (e.isIntersecting) {
                        e.target.classList.add('counter-pop');
                        popObs.unobserve(e.target);
                    }
                });
            }, { threshold: 0.4 });
            statCells.forEach(el => popObs.observe(el));

            // ---------- Keyboard shortcut toast ----------
            let kShown = false;
            addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k' && !kShown) {
                    kShown = true;
                    const toast = document.createElement('div');
                    toast.textContent = '⌘K — jumped to search';
                    Object.assign(toast.style, {
                        position: 'fixed', bottom: '96px', left: '50%',
                        transform: 'translateX(-50%)',
                        background: 'var(--bg-elev)', border: '1px solid var(--line)',
                        borderRadius: '8px', padding: '8px 16px',
                        fontSize: '13px', color: 'var(--fg-dim)',
                        zIndex: '99999', fontFamily: 'Geist Mono, monospace',
                        animation: 'fadeUp 0.3s ease',
                        pointerEvents: 'none',
                    });
                    document.body.appendChild(toast);
                    setTimeout(() => toast.remove(), 2000);
                }
            });

        }, 300));



    </script>
</body>

</html>
