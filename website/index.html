            --bg: #0b0b0d;

            --bg-elev-2: #1a1a1f;
            --fg: #ededf0;
            --fg-dim: #a0a0a8;
            --fg-faint: #5a5a62;
            --line: #242428;
            --line-soft: #1c1c20;
            --accent: oklch(0.72 0.17 280);
            --accent-soft: oklch(0.72 0.17 280 / 0.14);
            --accent-fg: #ffffff;
            --danger: oklch(0.70 0.18 25);
            --ok: oklch(0.78 0.15 155);
            --warn: oklch(0.80 0.15 80);
        }

        html[data-theme="light"] {
            --bg: #f7f7f5;
            --bg-elev: #ffffff;
            --bg-elev-2: #f0f0ec;
            --fg: #111113;
            --fg-dim: #5a5a62;
            --fg-faint: #9a9aa4;
            --line: #e4e4e0;
            --line-soft: #ededea;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--fg);
            font-family: 'Geist', -apple-system, system-ui, sans-serif;
            font-feature-settings: 'ss01', 'cv01';
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            color: inherit;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .mono {
            font-family: 'Geist Mono', ui-monospace, monospace;
        }

        .serif {
            font-family: 'Instrument Serif', serif;
        }

        ::selection {
            background: var(--accent);
            color: var(--accent-fg);
        }

        /* Grain overlay */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            opacity: 0.035;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        #root {
            position: relative;
            z-index: 1;
        }

        /* ============ AURORA BACKGROUND ============ */
        .aurora {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .aurora::before,
        .aurora::after {
            content: '';
            position: absolute;
            width: 70vw;
            height: 70vw;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.35;
            will-change: transform;
        }

        .aurora::before {
            background: radial-gradient(circle, var(--accent) 0%, transparent 60%);
            top: -20%;
            left: -20%;
            animation: auroraA 22s ease-in-out infinite alternate;
        }

        .aurora::after {
            background: radial-gradient(circle, oklch(0.6 0.22 220) 0%, transparent 60%);
            bottom: -30%;
            right: -20%;
            animation: auroraB 28s ease-in-out infinite alternate;
            opacity: 0.22;
        }

        @keyframes auroraA {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(30vw, 20vh) scale(1.2);
            }
        }

        @keyframes auroraB {
            0% {
                transform: translate(0, 0) scale(1);
            }

            100% {
                transform: translate(-25vw, -20vh) scale(1.3);
            }
        }

        /* ============ 3D CYBER GRID ============ */
        .cyber-grid {
            position: absolute;
            bottom: -50vh;
            left: -50vw;
            width: 200vw;
            height: 100vh;
            background-image: 
                linear-gradient(to right, var(--line-soft) 1px, transparent 1px),
                linear-gradient(to bottom, var(--line-soft) 1px, transparent 1px);
            background-size: 60px 60px;
            transform: perspective(600px) rotateX(75deg);
            animation: gridMove 10s linear infinite;
            opacity: 0.2;
            z-index: 0;
            pointer-events: none;
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 80%);
        }

        @keyframes gridMove {
            0% { transform: perspective(600px) rotateX(75deg) translateY(0); }
            100% { transform: perspective(600px) rotateX(75deg) translateY(60px); }
        }

        /* ============ BOOT LOADER ============ */
        .boot-loader {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s cubic-bezier(0.8, 0, 0.2, 1), transform 0.8s cubic-bezier(0.8, 0, 0.2, 1);
            transform-origin: top;
        }

        .boot-loader.hidden {
            opacity: 0;
            transform: scaleY(0);
            pointer-events: none;
        }

        .boot-text {
            font-family: 'Geist Mono', ui-monospace, monospace;
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 20px;
        }

        .boot-progress-bar {
            width: 200px;
            height: 2px;
            background: var(--line);
            overflow: hidden;
            position: relative;
        }

        .boot-progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* ============ SPOTLIGHT CARDS ============ */
        .spotlight-card {
            position: relative;
            overflow: hidden;
        }

        .spotlight-card::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
            background: radial-gradient(400px circle at var(--mouse-x, 0px) var(--mouse-y, 0px), var(--accent-soft), transparent 40%);
            pointer-events: none;
            z-index: 10;
        }

        .spotlight-card:hover::after {
            opacity: 1;
        }

        /* ============ SCROLL REVEAL ============ */
        [data-reveal] {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.9s cubic-bezier(0.22, 1, 0.36, 1), transform 0.9s cubic-bezier(0.22, 1, 0.36, 1);
        }

        [data-reveal].in {
            opacity: 1;
            transform: translateY(0);
        }

        [data-reveal="left"] {
            transform: translateX(-40px);
        }

        [data-reveal="left"].in {
            transform: translateX(0);
        }

        [data-reveal="right"] {
            transform: translateX(40px);
        }

        [data-reveal="right"].in {
            transform: translateX(0);
        }

        [data-reveal="scale"] {
            transform: scale(0.92);
        }

        [data-reveal="scale"].in {
            transform: scale(1);
        }

        /* ============ TEXT SHINE (for hero h1 italic) ============ */
        .shine {
            background: linear-gradient(110deg, var(--accent) 30%, #fff 50%, var(--accent) 70%);
            background-size: 250% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: shineMove 4s linear infinite;
        }

        @keyframes shineMove {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        /* ============ GLOW RING (buttons) ============ */
        .glow-ring {
            position: relative;
            isolation: isolate;
        }

        .glow-ring::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: inherit;
            background: conic-gradient(from var(--a, 0deg), var(--accent), transparent 30%, var(--accent));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
            animation: spinRing 3s linear infinite;
        }

        .glow-ring:hover::before {
            opacity: 0.85;
        }

        @keyframes spinRing {
            to {
                --a: 360deg;
            }
        }

        @property --a {
            syntax: '<angle>';
            inherits: false;
            initial-value: 0deg;
        }

        /* ============ MAGNETIC BUTTON BASE ============ */
        .magnetic {
            transition: transform 0.2s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: transform;
        }

        /* ============ FLOATING PARTICLES (hero bg) ============ */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.5;
            animation: drift var(--dur, 20s) linear infinite;
        }

        @keyframes drift {
            0% {
                transform: translate(0, 0);
                opacity: 0;
            }

            10% {
                opacity: 0.6;
            }

            90% {
                opacity: 0.6;
            }

            100% {
                transform: translate(var(--tx, 100px), var(--ty, -300px));
                opacity: 0;
            }
        }

        /* ============ MARQUEE ============ */
        .marquee-track {
            animation: marquee 40s linear infinite;
        }

        @keyframes marquee {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* ============ TYPEWRITER CARET ============ */
        .caret::after {
            content: '▍';
            color: var(--accent);
            animation: caretBlink 0.9s steps(2) infinite;
            margin-left: 2px;
        }

        @keyframes caretBlink {
            50% {
                opacity: 0;
            }
        }

        /* ============ CHAT ENTRANCE ============ */
        @keyframes chatIn {
            0% {
                opacity: 0;
                transform: translateY(14px) scale(0.96);
                filter: blur(4px);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ============ HERO HEADLINE MASK ============ */
        .head-mask {
            overflow: hidden;
            display: inline-block;
        }

        .head-inner {
            display: inline-block;
            animation: riseUp 1s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        .head-inner.d1 {
            animation-delay: 0.05s;
        }

        .head-inner.d2 {
            animation-delay: 0.18s;
        }

        .head-inner.d3 {
            animation-delay: 0.32s;
        }

        @keyframes riseUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* ============ RESPECT REDUCED MOTION ============ */
        @media (prefers-reduced-motion: reduce) {

            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

        // Kozzy the mascot — a geometric blob-bot. Animated eyes track cursor.
        // Not a copy of any existing character — just a friendly rounded rectangle with feelings.

        function Mascot({ size = 240, mood: defaultMood = 'neutral', blink = true }) {
            const [eye, setEye] = React.useState({ x: 0, y: 0 });
            const [blinking, setBlinking] = React.useState(false);
            const [mood, setMood] = React.useState(defaultMood);
            const [bouncing, setBouncing] = React.useState(false);
            const ref = React.useRef(null);

            React.useEffect(() => {
                if (!blink) return;
                let t;
                const loop = () => {
                    setBlinking(true);
                    setTimeout(() => setBlinking(false), 140);
                    t = setTimeout(loop, 2200 + Math.random() * 3500);
                };
                t = setTimeout(loop, 1500);
                return () => clearTimeout(t);
            }, [blink]);

            React.useEffect(() => {
                const onMove = (e) => {
                    if (!ref.current) return;
                    const r = ref.current.getBoundingClientRect();
                    const cx = r.left + r.width / 2;
                    const cy = r.top + r.height / 2;
                    const dx = (e.clientX - cx) / Math.max(r.width, 300);
                    const dy = (e.clientY - cy) / Math.max(r.height, 300);
                    const mag = Math.min(1, Math.hypot(dx, dy) * 1.4);
                    const ang = Math.atan2(dy, dx);
                    setEye({ x: Math.cos(ang) * mag * 4, y: Math.sin(ang) * mag * 4 });
                };
                window.addEventListener('mousemove', onMove);
                return () => window.removeEventListener('mousemove', onMove);
            }, []);

            const mouthPath = {
                neutral: 'M 78 130 Q 100 136 122 130',
                happy: 'M 76 126 Q 100 146 124 126',
                smug: 'M 80 132 Q 100 128 120 134',
                alert: 'M 82 132 L 118 132',

            const handleClick = () => {
                if (bouncing) return;
                setMood('happy');
                setBouncing(true);
                setTimeout(() => setBouncing(false), 400);
                setTimeout(() => setMood(defaultMood), 2000);
            };

            return (

        // ==== src/scramble.jsx ====
        function ScrambleText({ text, delay = 0 }) {
            const [out, setOut] = React.useState('');
            const chars = '!<>-_\\\\/[]{}—=+*^?#_';
            
            React.useEffect(() => {
                let start = null;
                const duration = 1200;
                let reqId;

                const tick = (now) => {
                    if (!start) start = now;
                    const elapsed = now - start;
                    if (elapsed < delay) {
                        reqId = requestAnimationFrame(tick);
                        return;
                    }
                    const progress = Math.max(0, Math.min(1, (elapsed - delay) / duration));
                    
                    if (progress >= 1) {
                        setOut(text);
                        return;
                    }
                    
                    const revealedCount = Math.floor(progress * text.length);
                    let scrambled = '';
                    for (let i = 0; i < text.length; i++) {
                        if (i < revealedCount || text[i] === ' ') {
                            scrambled += text[i];
                        } else {
                            scrambled += chars[Math.floor(Math.random() * chars.length)];
                        }
                    }
                    setOut(scrambled);
                    reqId = requestAnimationFrame(tick);
                };
                reqId = requestAnimationFrame(tick);
                return () => cancelAnimationFrame(reqId);
            }, [text, delay]);

            return <span>{out || '\u00A0'}</span>;
        }

        function StatCell({ n, label, note, isLast }) {
            const [val, setVal] = React.useState(0);
            const ref = React.useRef(null);
            const [hovered, setHovered] = React.useState(false);

            React.useEffect(() => {
                const io = new IntersectionObserver((entries) => {
                    entries.forEach((entry) => {
                        if (entry.isIntersecting) {
                            const duration = 1400;
                            const start = performance.now();
                            const tick = (now) => {
                                const t = Math.min(1, (now - start) / duration);
                                const eased = 1 - Math.pow(1 - t, 3);
                                setVal(Math.round(n * eased));
                                if (t < 1) requestAnimationFrame(tick);
                            };
                            requestAnimationFrame(tick);
                            io.disconnect();
                        }
                    });
                }, { threshold: 0.3 });
                if (ref.current) io.observe(ref.current);
                return () => io.disconnect();
            }, [n]);

            return (
                <div
                    ref={ref}
                    onMouseEnter={() => setHovered(true)}
                    onMouseLeave={() => setHovered(false)}
                    style={{
                        padding: '32px 28px',
                        borderRight: isLast ? 'none' : '1px solid var(--line)',
                        position: 'relative',
                        transition: 'background 0.2s',
                        background: hovered ? 'var(--bg-elev)' : 'transparent',
                    }}

                        <span className="mono" style={{ fontSize: 56, fontWeight: 500, letterSpacing: '-0.03em', lineHeight: 1 }}>

                    <div className="mono" style={{ marginTop: 4, fontSize: 11, color: 'var(--fg-faint)' }}>{note}</div>
                </div>
            );
        }

                                        </svg>
                                    </div>
                                    <div style={{ fontSize: 13, color: 'var(--fg-dim)', lineHeight: 1.45 }}>{c.desc}</div>
                                </div>
                            );

                    minWidth: 240,
                }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
                        <div className="mono" style={{ fontSize: 11, color: 'var(--fg-faint)', letterSpacing: '0.1em' }}>TWEAKS</div>
                        <MascotMini size={18} />
                    </div>
                    <div style={{ fontSize: 12, color: 'var(--fg-dim)', marginBottom: 10 }}>Accent color</div>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 6 }}>
                        {Object.values(accents).map((a) => (
                            <button key={a.name}
                                onClick={() => setAccent(a.name)}
                                style={{
                                    padding: '10px 8px',
                                    borderRadius: 8,
                                    border: '1px solid ' + (accent === a.name ? 'var(--fg)' : 'var(--line)'),
                                    background: 'var(--bg)',
                                    display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6,
                                    transition: 'all 0.15s',
                                }}>
                                <span style={{ width: 20, height: 20, borderRadius: 10, background: `oklch(${a.oklch})` }} />
                                <span style={{ fontSize: 11, color: accent === a.name ? 'var(--fg)' : 'var(--fg-dim)' }}>{a.label}</span>
                            </button>
                        ))}
                    </div>
                </div>
            );
        }

        Object.assign(window, { TweakPanel });


        // ==== src/app.jsx ====
        function App() {
            const [theme, setTheme] = React.useState('dark');
            const [accent, setAccent] = React.useState(window.KOZZ_TWEAKS?.accent || 'violet');
            const [editMode, setEditMode] = React.useState(false);

            // Apply theme
            React.useEffect(() => {
                document.documentElement.setAttribute('data-theme', theme);
            }, [theme]);

            // Apply accent
            React.useEffect(() => {
                const a = window.KOZZ.ACCENTS[accent];
                if (!a) return;
                document.documentElement.style.setProperty('--accent', `oklch(${a.oklch})`);
                document.documentElement.style.setProperty('--accent-soft', `oklch(${a.oklch} / 0.14)`);
                // on light accents, use dark fg; otherwise white
                const L = parseFloat(a.oklch.split(' ')[0]);
                document.documentElement.style.setProperty('--accent-fg', L > 0.78 ? '#0b0b0d' : '#ffffff');
            }, [accent]);

            // Edit-mode protocol
            React.useEffect(() => {
                const onMsg = (e) => {
                    if (e.data?.type === '__activate_edit_mode') setEditMode(true);
                    if (e.data?.type === '__deactivate_edit_mode') setEditMode(false);
                };
                window.addEventListener('message', onMsg);
                window.parent.postMessage({ type: '__edit_mode_available' }, '*');
                return () => window.removeEventListener('message', onMsg);
            }, []);

            // Keyboard: ⌘K focuses search
            React.useEffect(() => {
                const onKey = (e) => {
                    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                        e.preventDefault();
                        document.querySelector('#commands input')?.focus();
                    }
                };
                window.addEventListener('keydown', onKey);
                return () => window.removeEventListener('keydown', onKey);
            }, []);

            const handleSetAccent = (a) => {
                setAccent(a);
                window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { accent: a } }, '*');
            };

            return (
                <>
                    <Nav theme={theme} setTheme={setTheme} />
                    <Hero />
                    <Features />
                    <Commands />
                    <ClosingCTA />
                    <Footer />
                    <TweakPanel accent={accent} setAccent={handleSetAccent} visible={editMode} />
                </>
            );
        }

        function ClosingCTA() {
            return (
                <section style={{
                    padding: '120px 40px',
                    maxWidth: 1320,
                    margin: '0 auto',
                    textAlign: 'center',
                    position: 'relative',
                }}>
                    <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 24 }}>
                        <Mascot size={140} mood="happy" />
                    </div>
                    <h2 style={{ fontSize: 'clamp(40px, 5vw, 72px)', margin: 0, fontWeight: 500, letterSpacing: '-0.03em', lineHeight: 1 }}>
                        Add kozzyx to<br />
                        <span className="serif" style={{ fontStyle: 'italic', color: 'var(--accent)', fontWeight: 400 }}>your server</span>.
                    </h2>
                    <p style={{ fontSize: 17, color: 'var(--fg-dim)', marginTop: 20, maxWidth: 480, margin: '20px auto 0' }}>
                        Takes 30 seconds. Admin perms required for /server_setup.
                    </p>
                    <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginTop: 32, flexWrap: 'wrap' }}>
                        <a href={window.KOZZ.INVITE_URL} target="_blank" rel="noopener" style={{
                            padding: '15px 26px',
                            background: 'var(--accent)',
                            color: 'var(--accent-fg)',
                            borderRadius: 10,
                            fontSize: 15,
                            fontWeight: 600,
                            display: 'inline-block',
                        }}>Add to Discord →</a>
                        <a href="#commands" style={{
                            padding: '15px 22px',
                            border: '1px solid var(--line)',
                            borderRadius: 10,
                            fontSize: 15,
                            color: 'var(--fg)',
                            display: 'inline-block',
                        }}>See commands</a>
                    </div>
                </section>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);

        // ===================== ANIMATION RUNTIME =====================
        // Runs after React mounts. Adds scroll-reveal, magnetic buttons,
        // cursor trail on mascot area, and floating particles in hero.

        requestAnimationFrame(() => setTimeout(() => {
            // ---------- Scroll reveal ----------
            const revealTargets = [
                ['section > div > h2', 'up'],
                ['section > div .serif', 'up'],
                ['section p', 'up'],
                ['.discord-preview, [style*="border-radius: 16"]', 'scale'],
            ];
            // Generic: tag every section direct child
            document.querySelectorAll('section').forEach((sec) => {
                if (!sec.hasAttribute('data-reveal')) sec.setAttribute('data-reveal', 'up');
            });
            const io = new IntersectionObserver((entries) => {
                entries.forEach((e) => {
                    if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });
            document.querySelectorAll('[data-reveal]').forEach((el) => io.observe(el));

            // ---------- Magnetic buttons ----------
            document.querySelectorAll('a, button').forEach((el) => {
                const isCta = (el.textContent || '').match(/Add to Discord|View commands|Read the docs/);
                if (!isCta) return;
                el.classList.add('magnetic', 'glow-ring');
                el.addEventListener('mousemove', (e) => {
                    const r = el.getBoundingClientRect();
                    const x = (e.clientX - r.left - r.width / 2) * 0.25;
                    const y = (e.clientY - r.top - r.height / 2) * 0.4;
                    el.style.transform = `translate(${x}px, ${y}px)`;
                });
                el.addEventListener('mouseleave', () => { el.style.transform = ''; });
            });

            // ---------- Cursor trail (sparkles that fade) ----------
            const canvas = document.getElementById('trail');
            const ctx = canvas.getContext('2d');
            const resize = () => { if (canvas) { canvas.width = innerWidth; canvas.height = innerHeight; } };
            resize(); addEventListener('resize', resize);
            const trail = [];
            let active = false;
            addEventListener('mousemove', (e) => {
                active = true;
                trail.push({ x: e.clientX, y: e.clientY, life: 1, size: 2 + Math.random() * 3 });
                if (trail.length > 40) trail.shift();
            });
            const getAccent = () => getComputedStyle(document.documentElement).getPropertyValue('--accent') || 'violet';
            (function loop() {
                if (!canvas) return;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = trail.length - 1; i >= 0; i--) {
                    const p = trail[i];
                    p.life -= 0.035;
                    if (p.life <= 0) { trail.splice(i, 1); continue; }
                    ctx.beginPath();
                    ctx.fillStyle = getAccent().trim();
                    ctx.globalAlpha = p.life * 0.7;
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(loop);
            })();

            // ---------- Floating particles in hero ----------
            const hero = document.querySelector('section');
            if (hero) {
                const particles = document.createElement('div');
                particles.className = 'particles';
                for (let i = 0; i < 18; i++) {
                    const p = document.createElement('div');
                    p.className = 'particle';
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = 100 + Math.random() * 10 + '%';
                    p.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                    p.style.setProperty('--ty', -(400 + Math.random() * 400) + 'px');
                    p.style.setProperty('--dur', (12 + Math.random() * 16) + 's');
                    p.style.animationDelay = -(Math.random() * 20) + 's';
                    particles.appendChild(p);
                }
                hero.appendChild(particles);
            }

            // ---------- Parallax on hero mascot ----------
            const mascotWrap = document.querySelector('section [style*="animation: float"]');
            if (mascotWrap) {
                addEventListener('scroll', () => {
                    const y = scrollY * 0.15;
                    mascotWrap.style.setProperty('transform', `translateY(${-y}px)`);
                }, { passive: true });
            }

            // ---------- Tilt and Spotlight on feature visuals + dashboard ----------
            document.querySelectorAll('[style*="border-radius: 16"], [style*="boxShadow"]').forEach((card) => {
                if (card.offsetWidth < 200) return;
                
                card.classList.add('spotlight-card');
                card.style.transition = 'transform 0.3s cubic-bezier(0.22, 1, 0.36, 1)';
                
                card.addEventListener('mousemove', (e) => {
                    const r = card.getBoundingClientRect();
                    
                    card.style.setProperty('--mouse-x', `${e.clientX - r.left}px`);
                    card.style.setProperty('--mouse-y', `${e.clientY - r.top}px`);
                    
                    const rx = ((e.clientY - r.top) / r.height - 0.5) * -6;
                    const ry = ((e.clientX - r.left) / r.width - 0.5) * 6;
                    card.style.transform = `perspective(900px) rotateX(${rx}deg) rotateY(${ry}deg)`;
                });
                card.addEventListener('mouseleave', () => { card.style.transform = ''; });
            });

            // ---------- Bootloader Reveal ----------
            const loader = document.getElementById('boot-loader');
            const fill = document.getElementById('boot-fill');
            const bootText = document.getElementById('boot-text');
            if (loader && fill) {
                setTimeout(() => { fill.style.width = '30%'; }, 100);
                setTimeout(() => { fill.style.width = '70%'; bootText.textContent = 'ESTABLISHING CONNECTION...'; }, 400);
                setTimeout(() => { fill.style.width = '100%'; bootText.textContent = 'SYSTEM READY.'; }, 800);
                setTimeout(() => { loader.classList.add('hidden'); }, 1200);
            }

            // ---------- Apply text shine to hero italic ----------
            const heroItalic = document.querySelector('h1 .serif');
            if (heroItalic) heroItalic.classList.add('shine');

        }, 300));



    </script>
</body>

</html>
